name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pyright
      - run: python -W error::ResourceWarning -m pytest --cov=captains_chair --cov-report=term-missing --cov-fail-under=75
      - name: Enforce portable-core coverage
        run: >-
          coverage report
          --include='src/captains_chair/models.py,src/captains_chair/orchestration.py,src/captains_chair/policy.py,src/captains_chair/state.py,src/captains_chair/openclaw_workboard.py,src/captains_chair/openclaw_runtime.py,src/captains_chair/merge_gate.py,src/captains_chair/queue_events.py'
          --fail-under=80
      - run: python -m build

  test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pyright
      - run: python -W error::ResourceWarning -m pytest -q
      - run: python -m build

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
