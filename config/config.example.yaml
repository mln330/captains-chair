version: 1
state_dir: /home/example/.local/state/make-it-so
artifact_dir: /home/example/.local/state/make-it-so/artifacts

harnesses:
  openclaw:
    kind: openclaw
    executable: /home/example/.npm-global/bin/openclaw
    # Direct role routes select the dedicated OpenClaw crew agents below.
    default_agent: github-captain
    timeout_seconds: 3600
  codex:
    kind: codex
    executable: codex
    timeout_seconds: 3600

orchestrators:
  # Board-free execution. Set worker_runtime to openclaw to launch the same
  # portable claim/lease protocol through OpenClaw workers instead.
  direct-codex:
    kind: direct
    database_path: /home/example/.local/state/make-it-so/orchestrators/example-project.db
    worker_runtime: codex
    executable: codex
    lease_seconds: 3600
    max_dispatch_workers: 1
    workers:
      captain: direct-captain
      coder: direct-coder
      reviewer: direct-reviewer
      tester: direct-tester
      ux_reviewer: direct-ux
      final_reviewer: direct-final
      merger: direct-merge
      verifier: direct-verify
  openclaw-workers:
    kind: openclaw_workboard
    executable: /home/example/.npm-global/bin/openclaw
    codex_executable: /home/example/.local/share/make-it-so-codex/node_modules/.bin/codex
    make_it_so_command: [make-it-so, --config, /home/example/.config/make-it-so/config.yaml]
    board_prefix: make-it-so
    workers:
      captain: github-captain
      coder: github-coder
      reviewer: github-reviewer
      tester: github-tester
      ux_reviewer: github-ux
      final_reviewer: github-final
      merger: github-merge
      verifier: github-verify
    worker_models:
      # Recovery/control-plane work is Terra; Sol is reserved for strategy and final review.
      captain: codex/gpt-5.6-terra
      coder: codex/gpt-5.3-codex-spark
      tester: codex/gpt-5.6-luna
      reviewer: codex/gpt-5.6-terra
      ux_reviewer: codex/gpt-5.6-terra
      final_reviewer: codex/gpt-5.6-sol
      merger: codex/gpt-5.6-terra
      verifier: codex/gpt-5.6-terra
    # Workboard remains the P0 orchestration and audit surface. Only bounded
    # coding crosses the direct Codex process boundary to use the separate
    # Spark allowance; every other role remains an OpenClaw worker.
    worker_runtimes:
      captain: openclaw
      coder: codex
      reviewer: openclaw
      tester: openclaw
      ux_reviewer: openclaw
      final_reviewer: openclaw
      merger: openclaw
      verifier: openclaw
    auth_source_agent: codex-harness
    dispatch_timeout_seconds: 120
    # Bound metadata-only usage imports; increase only when the audit needs older sessions.
    session_limit: 1000
    max_runtime_seconds: 3600
    max_retries: 2
    require_live_completion_validation: true
models:
  baseline:
    primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: high}
    fallbacks: []
    allow_fallback: true
  planner:
    primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: medium}
    fallbacks: []
    allow_fallback: true
  coder:
    primary: {model: codex/gpt-5.3-codex-spark, agent: codex-harness, thinking: medium}
    fallbacks: []
    allow_fallback: true
  tester:
    primary: {model: codex/gpt-5.6-luna, agent: codex-harness, thinking: medium}
    fallbacks: []
    allow_fallback: true
  reviewer:
    primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: high}
    fallbacks: []
    allow_fallback: true
  final_reviewer:
    primary: {model: codex/gpt-5.6-sol, agent: codex-harness, thinking: high}
    fallbacks: []
    allow_fallback: false
  ux_reviewer:
    primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: medium}
    fallbacks: []
    allow_fallback: true
  comment_adjudicator:
    primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: high}
    fallbacks: []
    allow_fallback: true
  profiles:
    strategist:
      primary: {model: codex/gpt-5.6-sol, agent: codex-harness, thinking: high}
    course_verifier:
      primary: {model: codex/gpt-5.6-sol, agent: codex-harness, thinking: high}
    baseline_analyst:
      primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: high}
    subsystem_analyst:
      primary: {model: codex/gpt-5.6-luna, agent: codex-harness, thinking: medium}
    readiness_reviewer:
      primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: high}
    decomposer:
      primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: medium}
    package_planner:
      primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: medium}
    fast_coder:
      primary: {model: codex/gpt-5.3-codex-spark, agent: codex-harness, thinking: medium}
    complex_coder:
      primary: {model: codex/gpt-5.6-sol, agent: codex-harness, thinking: high}
    focused_coder:
      primary: {model: codex/gpt-5.3-codex-spark, agent: codex-harness, thinking: medium}
    local_coder:
      primary: {model: ollama/qualified-local, agent: codex-harness, thinking: medium}
    code_reviewer:
      primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: high}
    security_reviewer:
      primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: high}
    qa_assistant:
      primary: {model: codex/gpt-5.6-luna, agent: codex-harness, thinking: medium}
    ui_qa_reviewer:
      primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: medium}
    recovery_planner:
      primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: high}
    summarizer:
      primary: {model: codex/gpt-5.6-luna, agent: codex-harness, thinking: low}
harness_model_overrides:
  codex:
    baseline:
      primary: {model: gpt-5.6-terra, thinking: high}
    planner:
      primary: {model: gpt-5.6-terra, thinking: medium}
    coder:
      primary: {model: gpt-5.3-codex-spark, thinking: medium}
    tester:
      primary: {model: gpt-5.6-luna, thinking: medium}
    reviewer:
      primary: {model: gpt-5.6-terra, thinking: high}
    ux_reviewer:
      primary: {model: gpt-5.6-terra, thinking: medium}
    comment_adjudicator:
      primary: {model: gpt-5.6-terra, thinking: high}
    final_reviewer:
      primary: {model: gpt-5.6-sol, thinking: high}
      allow_fallback: false
    profiles:
      strategist:
        primary: {model: gpt-5.6-sol, thinking: high}
      course_verifier:
        primary: {model: gpt-5.6-sol, thinking: high}
      baseline_analyst:
        primary: {model: gpt-5.6-terra, thinking: high}
      subsystem_analyst:
        primary: {model: gpt-5.6-luna, thinking: medium}
      readiness_reviewer:
        primary: {model: gpt-5.6-terra, thinking: high}
      decomposer:
        primary: {model: gpt-5.6-terra, thinking: medium}
      package_planner:
        primary: {model: gpt-5.6-terra, thinking: medium}
      fast_coder:
        primary: {model: gpt-5.3-codex-spark, thinking: medium}
      complex_coder:
        primary: {model: gpt-5.6-sol, thinking: high}
      focused_coder:
        primary: {model: gpt-5.3-codex-spark, thinking: medium}
      local_coder:
        primary: {model: ollama/qualified-local, thinking: medium}
      code_reviewer:
        primary: {model: gpt-5.6-terra, thinking: high}
      security_reviewer:
        primary: {model: gpt-5.6-terra, thinking: high}
      qa_assistant:
        primary: {model: gpt-5.6-luna, thinking: medium}
      ui_qa_reviewer:
        primary: {model: gpt-5.6-terra, thinking: medium}
      recovery_planner:
        primary: {model: gpt-5.6-terra, thinking: high}
      summarizer:
        primary: {model: gpt-5.6-luna, thinking: low}
  # Direct OpenClaw adapter routes use an explicit Codex provider prefix so
  # they cannot silently resolve through the gateway's default Ollama route.
  # This is ChatGPT-account Codex execution, not an OpenAI API-key request.
  # These mappings cover harness calls that execute inside an OpenClaw agent.
  # Workboard coding cards use the orchestrator's per-role `worker_runtimes`
  # mapping above and therefore execute Spark through direct Codex instead.
  openclaw:
    baseline:
      primary: {model: codex/gpt-5.6-terra, agent: github-captain, thinking: high}
    planner:
      primary: {model: codex/gpt-5.6-terra, agent: github-captain, thinking: medium}
    coder:
      primary: {model: codex/gpt-5.6-terra, agent: github-coder, thinking: medium}
    tester:
      primary: {model: codex/gpt-5.6-luna, agent: github-tester, thinking: medium}
    reviewer:
      primary: {model: codex/gpt-5.6-terra, agent: github-reviewer, thinking: high}
    ux_reviewer:
      primary: {model: codex/gpt-5.6-terra, agent: github-ux, thinking: medium}
    comment_adjudicator:
      primary: {model: codex/gpt-5.6-terra, agent: github-reviewer, thinking: high}
    final_reviewer:
      primary: {model: codex/gpt-5.6-sol, agent: github-final, thinking: high}
      allow_fallback: false
    profiles:
      strategist:
        primary: {model: codex/gpt-5.6-sol, agent: github-final, thinking: high}
      course_verifier:
        primary: {model: codex/gpt-5.6-sol, agent: github-final, thinking: high}
      baseline_analyst:
        primary: {model: codex/gpt-5.6-terra, agent: github-captain, thinking: high}
      subsystem_analyst:
        primary: {model: codex/gpt-5.6-luna, agent: github-tester, thinking: medium}
      readiness_reviewer:
        primary: {model: codex/gpt-5.6-terra, agent: github-captain, thinking: high}
      decomposer:
        primary: {model: codex/gpt-5.6-terra, agent: github-captain, thinking: medium}
      package_planner:
        primary: {model: codex/gpt-5.6-terra, agent: github-captain, thinking: medium}
      fast_coder:
        primary: {model: codex/gpt-5.6-terra, agent: github-coder, thinking: medium}
      complex_coder:
        primary: {model: codex/gpt-5.6-sol, agent: github-final, thinking: high}
      focused_coder:
        primary: {model: codex/gpt-5.6-terra, agent: github-coder, thinking: medium}
      local_coder:
        primary: {model: ollama/qualified-local, thinking: medium}
      code_reviewer:
        primary: {model: codex/gpt-5.6-terra, agent: github-reviewer, thinking: high}
      security_reviewer:
        primary: {model: codex/gpt-5.6-terra, agent: github-reviewer, thinking: high}
      qa_assistant:
        primary: {model: codex/gpt-5.6-luna, agent: github-tester, thinking: medium}
      ui_qa_reviewer:
        primary: {model: codex/gpt-5.6-terra, agent: github-ux, thinking: medium}
      recovery_planner:
        primary: {model: codex/gpt-5.6-terra, agent: github-captain, thinking: high}
      summarizer:
        primary: {model: codex/gpt-5.6-luna, agent: github-tester, thinking: low}

usage:
  # Optional account-wide same-day safeguards using provider-reported tokens only.
  # daily_token_limit: 2000000
  # model_daily_token_limits:
  #   gpt-5.6-sol: 250000
  block_on_unknown: true
  # Supervised-only escape hatch for runtimes that expose partial telemetry.
  # Missing usage remains unknown and is never converted to zero.
  allow_incomplete_telemetry: false
  retention_days: 90

repos:
  - full_name: example/project
    local_path: /home/example/repos/project
    default_branch: main
    # disabled stops cycles, baselines, dispatch, and Workboard mutations.
    operation_mode: advisory
    completion_policy: owner_approval
    allow_autonomous_merge: false
    canonical_docs: [README.md, docs/architecture.md]
    planning_doc: docs/IMPLEMENTATION_PLAN.md
    # Greenfield provisioning is disabled unless explicitly approved.
    provisioning:
      enabled: false
      visibility: private
      description: ""
    require_project_manifest: true
    checks: [pytest]
    docs_checks: []
    ux_enabled: true
    ux_paths: [frontend/, "*.tsx", "*.jsx", "*.css", "*.html"]
    preserved_prs: []
    orchestrator: direct-codex
    orchestration_board: make-it-so-example-project
    notification:
      kind: stdout
