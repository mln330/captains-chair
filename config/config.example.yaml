version: 1
state_dir: /home/example/.local/state/captains-chair
artifact_dir: /home/example/.local/state/captains-chair/artifacts

harnesses:
  openclaw:
    kind: openclaw
    executable: /home/example/.npm-global/bin/openclaw
    default_agent: codex-harness
    timeout_seconds: 3600
  codex:
    kind: codex
    executable: codex
    timeout_seconds: 3600

orchestrators:
  # Board-free execution. Set worker_runtime to openclaw to launch the same
  # portable claim/lease protocol through OpenClaw workers instead.
  direct-codex:
    kind: direct
    database_path: /home/example/.local/state/captains-chair/orchestrators/example-project.db
    worker_runtime: codex
    executable: codex
    lease_seconds: 3600
    max_dispatch_workers: 1
    workers:
      captain: direct-captain
      coder: direct-coder
      reviewer: direct-reviewer
      tester: direct-tester
      ux_reviewer: direct-ux
      final_reviewer: direct-final
      merger: direct-merge
      verifier: direct-verify
  openclaw-workers:
    kind: openclaw_workboard
    executable: /home/example/.npm-global/bin/openclaw
    captains_chair_command: [captains-chair, --config, /home/example/.config/captains-chair/config.yaml]
    board_prefix: captains-chair
    workers:
      captain: github-captain
      coder: github-coder
      reviewer: github-reviewer
      tester: github-tester
      ux_reviewer: github-ux
      final_reviewer: github-final
      merger: github-merge
      verifier: github-verify
    worker_models:
      captain: codex/gpt-5.6-sol
      # Validate routes against the selected runtime with `captains-chair model-check`.
      coder: codex/gpt-5.3-codex-spark
      tester: codex/gpt-5.6-luna
      reviewer: codex/gpt-5.6-terra
      ux_reviewer: codex/gpt-5.6-terra
      final_reviewer: codex/gpt-5.6-sol
      merger: codex/gpt-5.6-terra
      verifier: codex/gpt-5.6-terra
    auth_source_agent: codex-harness
    dispatch_timeout_seconds: 120
    # Bound metadata-only usage imports; increase only when the audit needs older sessions.
    session_limit: 1000
    max_runtime_seconds: 3600
    max_retries: 2
    require_live_completion_validation: true
models:
  baseline:
    primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: high}
    fallbacks: []
    allow_fallback: true
  planner:
    primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: medium}
    fallbacks: []
    allow_fallback: true
  coder:
    primary: {model: codex/gpt-5.3-codex-spark, agent: codex-harness, thinking: medium}
    fallbacks: []
    allow_fallback: true
  tester:
    primary: {model: codex/gpt-5.6-luna, agent: codex-harness, thinking: medium}
    fallbacks: []
    allow_fallback: true
  reviewer:
    primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: high}
    fallbacks: []
    allow_fallback: true
  final_reviewer:
    primary: {model: codex/gpt-5.6-sol, agent: codex-harness, thinking: high}
    fallbacks: []
    allow_fallback: false
  ux_reviewer:
    primary: {model: codex/gpt-5.6-terra, agent: codex-harness, thinking: medium}
    fallbacks: []
    allow_fallback: true
harness_model_overrides:
  codex:
    baseline:
      primary: {model: gpt-5.6-terra, thinking: high}
    planner:
      primary: {model: gpt-5.6-terra, thinking: medium}
    coder:
      primary: {model: gpt-5.3-codex-spark, thinking: medium}
    tester:
      primary: {model: gpt-5.6-luna, thinking: medium}
    reviewer:
      primary: {model: gpt-5.6-terra, thinking: high}
    ux_reviewer:
      primary: {model: gpt-5.6-terra, thinking: medium}
    final_reviewer:
      primary: {model: gpt-5.6-sol, thinking: high}
      allow_fallback: false

usage:
  # Optional account-wide same-day safeguards using provider-reported tokens only.
  # daily_token_limit: 2000000
  # model_daily_token_limits:
  #   gpt-5.6-sol: 250000
  block_on_unknown: true
  # Supervised-only escape hatch for runtimes that expose partial telemetry.
  # Missing usage remains unknown and is never converted to zero.
  allow_incomplete_telemetry: false
  retention_days: 90

repos:
  - full_name: example/project
    local_path: /home/example/repos/project
    default_branch: main
    # disabled stops cycles, baselines, dispatch, and Workboard mutations.
    operation_mode: advisory
    completion_policy: owner_approval
    allow_autonomous_merge: false
    canonical_docs: [README.md, docs/architecture.md]
    planning_doc: docs/IMPLEMENTATION_PLAN.md
    # Greenfield provisioning is disabled unless explicitly approved.
    provisioning:
      enabled: false
      visibility: private
      description: ""
    require_project_manifest: true
    checks: [pytest]
    docs_checks: []
    ux_enabled: true
    ux_paths: [frontend/, "*.tsx", "*.jsx", "*.css", "*.html"]
    preserved_prs: []
    orchestrator: direct-codex
    orchestration_board: captains-chair-example-project
    notification:
      kind: stdout
